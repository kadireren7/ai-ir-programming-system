<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="8" fill="#7C3AED"/>
  <!-- Robot head -->
  <rect x="11" y="14" width="18" height="14" rx="3" fill="white" fill-opacity="0.9"/>
  <!-- Eyes -->
  <circle cx="16" cy="20" r="2" fill="#7C3AED"/>
  <circle cx="24" cy="20" r="2" fill="#7C3AED"/>
  <!-- Mouth -->
  <rect x="15" y="24" width="10" height="2" rx="1" fill="#7C3AED"/>
  <!-- Antenna -->
  <line x1="20" y1="14" x2="20" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="8" r="2" fill="white"/>
</svg>
