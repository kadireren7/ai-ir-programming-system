openapi: 3.0.3
info:
  title: Torqa Dashboard HTTP API
  description: |
    Public and operator-facing endpoints exposed by the Torqa Next.js dashboard.
    Authenticated app routes are cookie-based (Supabase); server-to-server scans use API keys below.
  version: "0.2.0"

servers:
  - url: /
    description: Same origin as the dashboard

paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Liveness and configuration snapshot
      description: |
        Always returns HTTP 200. Use the `status` field (`ok` | `degraded`) for readiness-style checks.
        No authentication required; response contains no secrets.
      tags: [Operations]
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"

  /api/public/scan:
    post:
      operationId: publicScan
      summary: Run a workflow scan with an API key
      description: |
        Requires a valid API key (`x-api-key` or `Authorization: Bearer`). Supabase and
        `SUPABASE_SERVICE_ROLE_KEY` must be configured on the server. Successful responses wrap the
        scan payload in `{ ok, data, meta }` unless `?legacy=1` is used.
      tags: [User API]
      security:
        - ApiKeyHeader: []
        - BearerAuth: []
      parameters:
        - name: legacy
          in: query
          schema:
            type: string
            enum: ["1", "true"]
          description: If set, return the raw scan JSON instead of the wrapped envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicScanRequest"
      responses:
        "200":
          description: Scan completed (see legacy query for envelope shape)
          headers:
            x-torqa-api-version:
              schema:
                type: string
                example: v1
            x-ratelimit-limit:
              schema:
                type: string
            x-ratelimit-remaining:
              schema:
                type: string
            x-ratelimit-reset:
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PublicScanSuccessEnvelope"
                  - type: object
                    description: Legacy body when legacy=1 (scan engine result)
        "400":
          description: Invalid JSON or validation error
        "401":
          description: Missing or invalid API key
        "429":
          description: Rate limited (when enforced)
        "500":
          description: Server or database error
        "503":
          description: Scan API unavailable (e.g. admin client not configured)

  /api/scan-schedules/cron/tick:
    post:
      operationId: cronTick
      summary: Execute due scan schedules (worker)
      description: Requires `Authorization: Bearer` matching `TORQA_CRON_SECRET` and Supabase service role.
      tags: [Operations]
      security:
        - CronBearer: []
      responses:
        "200":
          description: Tick summary with run counts
        "401":
          description: Invalid cron secret
        "503":
          description: Secret or admin client not configured

  /api/webhooks/github:
    post:
      operationId: githubWebhook
      summary: GitHub repository webhook (push/ping/pull_request)
      description: Verifies `X-Hub-Signature-256` with `GITHUB_WEBHOOK_SECRET`. `pull_request` (opened/synchronize/reopened) runs Torqa scan + PR comment when GitHub API token is configured — see docs/github-pr-automation.md.
      tags: [Integrations]
      responses:
        "200":
          description: Parsed metadata
        "401":
          description: Bad signature
        "503":
          description: Secret not configured

  /api/integrations/n8n/workflows:
    get:
      operationId: listN8nWorkflows
      summary: Proxy list workflows from configured n8n
      description: Session cookie auth; server env `N8N_BASE_URL` + `N8N_API_KEY`.
      tags: [Integrations]
      responses:
        "200":
          description: n8n API JSON under `workflows`
        "401":
          description: Not signed in
        "503":
          description: n8n env not set

  /api/onboarding/progress:
    get:
      operationId: getOnboardingProgress
      summary: Current user onboarding row
      tags: [Workspace]
      responses:
        "200":
          description: Progress object
        "401":
          description: Unauthorized
    patch:
      operationId: patchOnboardingProgress
      summary: Update onboarding (wizard complete, checklist dismiss, step ack)
      tags: [Workspace]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                wizardCompleted:
                  type: boolean
                dismissChecklist:
                  type: boolean
                stepsAck:
                  type: object
      responses:
        "200":
          description: Updated progress

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
    CronBearer:
      type: http
      scheme: bearer
      bearerFormat: TORQA_CRON_SECRET

  schemas:
    HealthSnapshot:
      type: object
      required: [status, version, environment, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        environment:
          type: string
          enum: [development, production, test, unknown]
        checks:
          type: object
          additionalProperties: true
        scanProviderIdsSupported:
          type: array
          items:
            type: string

    PublicScanRequest:
      type: object
      required: [source, content]
      properties:
        source:
          type: string
          enum: [n8n, generic]
        content:
          type: object
          additionalProperties: true
          description: Workflow JSON or generic document for the configured scan provider.
        policyTemplateSlug:
          type: string
          nullable: true
        workspacePolicyId:
          type: string
          format: uuid
          nullable: true

    PublicScanSuccessEnvelope:
      type: object
      required: [ok, data, meta]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          description: Scan engine success payload (findings, scores, etc.)
        meta:
          type: object
          required: [requestId, apiVersion]
          properties:
            requestId:
              type: string
            apiVersion:
              type: string
              enum: [v1]

tags:
  - name: Operations
    description: Health and diagnostics
  - name: User API
    description: API key authenticated integrations
  - name: Integrations
    description: Webhooks and external tools
  - name: Workspace
    description: Onboarding and workspace preferences
