# Torqa v0.2.0 — local dashboard + optional env file.
# Copy `.env.example` to `.env` in the repo root or set `env_file` below.
# Python engine / Supabase are not started here; point the dashboard at hosted services.

services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
