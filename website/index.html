<!doctype html>
<html lang="en" data-torqa-surface="website" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="TORQA — same software intent, fewer tokens, validated before execution. Semantic compression, hard validation gate, multi-surface projection." />
    <title>TORQA — torqa.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <!-- TRIAL_READINESS.md -->
    <!-- CI / legacy substring markers (not shown; React owns visible UI) -->
    <template id="torqa-ci-markers">
      <span id="site-start-here"></span>
      <span id="site-first-run"></span>
      <span id="site-what-is"></span>
      <span id="site-flagship"></span>
      <span id="site-validation"></span>
      <span id="site-compression"></span>
      <span id="site-docs"></span>
      <span id="site-desktop-cta"></span>
    </template>
  </head>
  <body>
    <button
      type="button"
      id="site-theme-toggle"
      tabindex="-1"
      aria-hidden="true"
      style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0"
    ></button>
    <div id="site-benchmark-root" style="display: none" aria-hidden="true"></div>
    <div id="root"></div>
    <script src="/static/shared/benchmark_panel.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
